<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OFFLINE COMEDY — CHECK-IN</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #00ff41;
      --green-dim:  #00b32c;
      --green-dark: #003b0f;
      --yellow:     #ffd700;
      --red:        #ff4444;
      --bg:         #050505;
    }

    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, rgba(0,255,65,.025) 0px, rgba(0,255,65,.025) 1px, transparent 1px, transparent 2px);
      pointer-events: none; z-index: 999;
    }

    .terminal {
      width: 100%; max-width: 640px;
      border: 1px solid var(--green-dim);
      border-radius: 4px;
      box-shadow: 0 0 24px rgba(0,255,65,.18), 0 0 80px rgba(0,255,65,.06);
      overflow: hidden;
    }

    .terminal-bar {
      background: var(--green-dark);
      border-bottom: 1px solid var(--green-dim);
      padding: 8px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .dots { display: flex; gap: 6px; }
    .dot  { width: 11px; height: 11px; border-radius: 50%; background: var(--green-dim); opacity: .45; }
    .terminal-title { flex: 1; text-align: center; font-size: .68rem; color: var(--green-dim); letter-spacing: .18em; }

    .terminal-body { padding: 1.4rem 1.6rem 2rem; background: var(--bg); }

    .ln { font-size: .82rem; line-height: 1.65; }
    .dim    { color: var(--green-dim); }
    .bright { color: var(--green); text-shadow: 0 0 8px rgba(0,255,65,.55); }
    .yellow { color: var(--yellow); }

    .sep { border: none; border-top: 1px solid var(--green-dark); margin: 1rem 0; }

    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: .74rem; color: var(--green-dim); margin-bottom: .3rem; letter-spacing: .07em; }
    .form-label em { color: var(--green); font-style: normal; }

    .input-row {
      display: flex; align-items: center;
      border: 1px solid var(--green-dark); background: #0a0a0a;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-row:focus-within { border-color: var(--green); box-shadow: 0 0 10px rgba(0,255,65,.2); }
    .input-pfx { padding: .5rem .65rem; color: var(--green-dim); font-size: .85rem; user-select: none; }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      background: transparent; border: none; outline: none;
      color: var(--green); font-family: inherit; font-size: .88rem;
      width: 100%; padding: .5rem .5rem .5rem 0; caret-color: var(--green);
    }
    input::placeholder { color: #1c4827; }

    select {
      background: #0a0a0a; border: 1px solid var(--green-dark);
      color: var(--green); font-family: inherit; font-size: .82rem;
      padding: .5rem; width: 100%; cursor: pointer; outline: none;
    }
    select:focus { border-color: var(--green); }
    select option { background: #0a0a0a; color: var(--green); }

    .btn {
      background: transparent; border: 1px solid var(--green);
      color: var(--green); font-family: inherit; font-size: .8rem;
      padding: .55rem 1rem; cursor: pointer; letter-spacing: .15em;
      text-transform: uppercase; transition: background .18s, box-shadow .18s, color .18s;
    }
    .btn:hover  { background: var(--green); color: #000; box-shadow: 0 0 18px rgba(0,255,65,.4); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-sm { padding: .35rem .7rem; font-size: .72rem; }
    .btn-red { border-color: var(--red); color: var(--red); }
    .btn-red:hover { background: var(--red); color: #000; box-shadow: 0 0 18px rgba(255,68,68,.4); }

    .flash { font-size: .78rem; padding: .5rem .8rem; border: 1px solid; margin-bottom: 1rem; display: none; }
    .flash.err { border-color: var(--red); color: var(--red); }
    .flash.show { display: block; }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 1.2rem;
    }
    .progress-labels {
      display: flex; justify-content: space-between; font-size: .72rem; margin-bottom: .35rem;
    }
    .progress-labels .lbl-in  { color: var(--green); }
    .progress-labels .lbl-out { color: var(--yellow); }
    .progress-bar {
      width: 100%; height: 18px;
      background: var(--green-dark);
      border: 1px solid var(--green-dark);
      overflow: hidden;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      background: var(--green);
      box-shadow: 0 0 10px rgba(0,255,65,.5);
      transition: width .4s ease;
    }
    .progress-text {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .68rem; color: #000; font-weight: bold;
      mix-blend-mode: difference;
      color: var(--green-dim);
    }

    /* Guest list */
    .guest-list { margin-top: .5rem; }

    .section-label {
      font-size: .7rem; color: var(--green-dim); letter-spacing: .15em;
      margin: .8rem 0 .4rem; text-transform: uppercase;
    }

    .guest-row {
      border: 1px solid var(--green-dark);
      padding: .7rem .9rem;
      margin-bottom: .5rem;
      background: rgba(0,255,65,.02);
    }
    .guest-row.checked-in {
      border-color: rgba(0,255,65,.15);
      background: rgba(0,255,65,.04);
      opacity: .7;
    }

    .guest-top {
      display: flex; align-items: center; gap: .8rem;
    }
    .guest-name { font-size: .82rem; color: var(--green); flex: 1; min-width: 100px; }
    .guest-info { font-size: .72rem; color: var(--green-dim); }
    .guest-status { font-size: .72rem; }
    .guest-status.in  { color: var(--green); }
    .guest-status.out { color: var(--yellow); }

    .checkin-controls {
      display: flex; align-items: center; gap: .5rem;
      margin-top: .5rem;
    }
    .checkin-controls .qty-btn {
      background: transparent; border: 1px solid var(--green-dark);
      color: var(--green-dim); font-family: inherit; font-size: .85rem;
      width: 28px; height: 28px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: border-color .15s, color .15s;
    }
    .checkin-controls .qty-btn:hover { border-color: var(--green); color: var(--green); }
    .checkin-count { font-size: .85rem; color: var(--green); min-width: 1.5rem; text-align: center; }

    /* Undo confirmation overlay */
    .undo-confirm {
      margin-top: .5rem; padding: .5rem .7rem;
      border: 1px solid var(--red);
      background: rgba(255,68,68,.06);
      display: flex; align-items: center; gap: .6rem; flex-wrap: wrap;
    }
    .undo-confirm .undo-msg { font-size: .72rem; color: var(--red); flex: 1; min-width: 140px; }

    /* Countdown */
    .countdown {
      text-align: center;
      padding: .6rem;
      border: 1px solid var(--green-dark);
      background: rgba(0,255,65,.02);
      margin-bottom: 1rem;
      display: none;
    }
    .countdown-label {
      font-size: .68rem; color: var(--green-dim); letter-spacing: .15em;
      margin-bottom: .25rem;
    }
    .countdown-time {
      font-size: 1.4rem; color: var(--green);
      text-shadow: 0 0 12px rgba(0,255,65,.5);
      letter-spacing: .12em;
    }
    .countdown-time.soon {
      color: var(--yellow);
      text-shadow: 0 0 12px rgba(255,215,0,.5);
    }
    .countdown-time.live {
      color: var(--green);
      animation: pulse 1.5s ease infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: .6; }
    }

    #login-section, #checkin-section { display: none; }

    .cur {
      display: inline-block; width: 8px; height: .9em;
      background: var(--green); vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>

<div class="terminal">
  <div class="terminal-bar">
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="terminal-title">offlinecomedy.com — door_checkin.enc</div>
  </div>

  <div class="terminal-body">

    <!-- Login -->
    <div id="login-section">
      <div class="ln bright" style="margin-bottom:1rem">[ STAFF LOGIN ]</div>
      <div id="login-flash" class="flash err"></div>

      <div class="form-group">
        <label class="form-label" for="login-email"><em>EMAIL</em></label>
        <div class="input-row">
          <span class="input-pfx">$&gt;</span>
          <input type="email" id="login-email" placeholder="staff@offlinecomedy.com" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="login-pass"><em>PASSWORD</em></label>
        <div class="input-row">
          <span class="input-pfx">$&gt;</span>
          <input type="password" id="login-pass" placeholder="password" />
        </div>
      </div>

      <button class="btn" id="login-btn" style="width:100%">Login</button>
    </div>

    <!-- Check-in panel -->
    <div id="checkin-section">
      <div class="ln bright" style="margin-bottom:.3rem">[ DOOR CHECK-IN ]</div>
      <div class="ln dim" id="staff-greeting" style="margin-bottom:1rem"></div>

      <div class="form-group">
        <label class="form-label"><em>SELECT SHOW</em></label>
        <select id="show-select"><option value="">Loading shows...</option></select>
      </div>

      <div id="show-panel" style="display:none">
        <div class="countdown" id="countdown">
          <div class="countdown-label">SHOWTIME IN</div>
          <div class="countdown-time" id="countdown-time"></div>
        </div>
        <div class="progress-wrap" id="progress-wrap"></div>

        <div class="form-group">
          <label class="form-label"><em>SEARCH</em> // name or phone</label>
          <div class="input-row">
            <span class="input-pfx">$&gt;</span>
            <input type="text" id="search-input" placeholder="Name or phone number..." />
          </div>
        </div>

        <div class="guest-list" id="guest-list"></div>
      </div>
    </div>

    <div style="margin-top:1.4rem"><span class="ln dim">&gt; </span><span class="cur"></span></div>
  </div>
</div>

<script>
  const API = 'https://offlinecomedy-backend.vercel.app/api';

  let token       = sessionStorage.getItem('staff_token');
  let staffInfo   = JSON.parse(sessionStorage.getItem('staff_info') || 'null');
  let currentShowId = null;
  let showsData   = [];
  let guests      = [];
  let undoId      = null;
  let countdownInterval = null;

  function flashLogin(msg) {
    const el = document.getElementById('login-flash');
    el.textContent = '$ ' + msg;
    el.classList.add('show');
  }

  // Login
  document.getElementById('login-btn').addEventListener('click', async () => {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    if (!email || !pass) { flashLogin('Email and password required.'); return; }

    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Authenticating...';

    try {
      const res = await fetch(`${API}/staff-login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      token = data.token;
      staffInfo = data.staff;
      sessionStorage.setItem('staff_token', token);
      sessionStorage.setItem('staff_info', JSON.stringify(staffInfo));
      showCheckinPanel();
    } catch (err) {
      flashLogin(err.message);
      btn.disabled = false;
      btn.textContent = '> Login';
    }
  });

  document.getElementById('login-pass').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });

  async function showCheckinPanel() {
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('checkin-section').style.display = 'block';
    document.getElementById('staff-greeting').textContent = `$ logged in as ${staffInfo.name} (${staffInfo.role})`;
    await loadShowList();
  }

  async function loadShowList() {
    const select = document.getElementById('show-select');
    select.innerHTML = '<option value="">-- Pick a show --</option>';

    try {
      const res = await fetch(`${API}/shows-list`, {
        headers: { 'x-staff-token': token },
      });
      showsData = await res.json();
      if (Array.isArray(showsData)) {
        showsData.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = `${s.date} — ${s.city}`;
          select.appendChild(opt);
        });
      }
    } catch {
      select.innerHTML = '<option value="">Error loading shows</option>';
    }
  }

  document.getElementById('show-select').addEventListener('change', () => {
    currentShowId = document.getElementById('show-select').value;
    if (currentShowId) {
      document.getElementById('show-panel').style.display = 'block';
      document.getElementById('search-input').value = '';
      startCountdown();
      searchGuests('');
    } else {
      document.getElementById('show-panel').style.display = 'none';
      stopCountdown();
    }
  });

  function parseShowDateTime(show) {
    // date format: "04.25.2026", show_time: "8:00 PM"
    if (!show.date || !show.show_time) return null;
    const [mm, dd, yyyy] = show.date.split('.');
    const timeStr = show.show_time.trim();
    const match = timeStr.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
    if (!match) return null;
    let hours = parseInt(match[1]);
    const mins = parseInt(match[2]);
    const ampm = match[3].toUpperCase();
    if (ampm === 'PM' && hours < 12) hours += 12;
    if (ampm === 'AM' && hours === 12) hours = 0;
    return new Date(parseInt(yyyy), parseInt(mm) - 1, parseInt(dd), hours, mins, 0);
  }

  function startCountdown() {
    stopCountdown();
    const show = showsData.find(s => s.id === currentShowId);
    if (!show) return;

    const target = parseShowDateTime(show);
    if (!target) {
      document.getElementById('countdown').style.display = 'none';
      return;
    }

    document.getElementById('countdown').style.display = 'block';

    function tick() {
      const now = new Date();
      const diff = target - now;
      const el = document.getElementById('countdown-time');
      const labelEl = document.getElementById('countdown').querySelector('.countdown-label');

      if (diff <= 0) {
        labelEl.textContent = 'STATUS';
        el.textContent = 'SHOWTIME';
        el.className = 'countdown-time live';
        return;
      }

      const days  = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const mins  = Math.floor((diff % 3600000) / 60000);
      const secs  = Math.floor((diff % 60000) / 1000);

      let display;
      if (days > 0) {
        display = `${days}d ${String(hours).padStart(2,'0')}h ${String(mins).padStart(2,'0')}m ${String(secs).padStart(2,'0')}s`;
      } else {
        display = `${String(hours).padStart(2,'0')}h ${String(mins).padStart(2,'0')}m ${String(secs).padStart(2,'0')}s`;
      }

      labelEl.textContent = 'SHOWTIME IN';
      el.textContent = display;
      el.className = 'countdown-time' + (diff < 3600000 ? ' soon' : '');
    }

    tick();
    countdownInterval = setInterval(tick, 1000);
  }

  function stopCountdown() {
    if (countdownInterval) {
      clearInterval(countdownInterval);
      countdownInterval = null;
    }
  }

  let searchTimeout;
  document.getElementById('search-input').addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => searchGuests(e.target.value), 300);
  });

  async function searchGuests(query) {
    if (!currentShowId) return;

    try {
      const url = `${API}/checkin?show_id=${encodeURIComponent(currentShowId)}${query ? '&q=' + encodeURIComponent(query) : ''}`;
      const res = await fetch(url, {
        headers: { 'x-staff-token': token },
      });
      guests = await res.json();
      if (!res.ok) throw new Error(guests.error);
      undoId = null;
      renderGuests();
    } catch (err) {
      document.getElementById('guest-list').innerHTML = `<div class="ln yellow">$ ${err.message}</div>`;
    }
  }

  function renderProgressBar() {
    const totalTickets   = guests.reduce((s, g) => s + g.quantity, 0);
    const totalCheckedIn = guests.reduce((s, g) => s + g.checked_in_count, 0);
    const pct = totalTickets > 0 ? (totalCheckedIn / totalTickets * 100) : 0;
    const notIn = totalTickets - totalCheckedIn;

    document.getElementById('progress-wrap').innerHTML = `
      <div class="progress-labels">
        <span class="lbl-in">${totalCheckedIn} checked in</span>
        <span class="lbl-out">${notIn} remaining</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%"></div>
        <div class="progress-text">${totalCheckedIn} / ${totalTickets}</div>
      </div>
    `;
  }

  function renderGuests() {
    const listEl = document.getElementById('guest-list');
    renderProgressBar();

    if (guests.length === 0) {
      listEl.innerHTML = '<div class="ln dim">$ no matching guests found</div>';
      return;
    }

    listEl.innerHTML = '';

    // Split into not-checked-in and checked-in
    const notIn = guests.filter(g => g.checked_in_count < g.quantity);
    const inList = guests.filter(g => g.checked_in_count >= g.quantity);

    if (notIn.length > 0) {
      notIn.forEach(g => listEl.appendChild(buildGuestRow(g)));
    }

    if (inList.length > 0) {
      const divider = document.createElement('div');
      divider.innerHTML = '<hr class="sep" /><div class="section-label">&#10003; checked in</div>';
      listEl.appendChild(divider);
      inList.forEach(g => listEl.appendChild(buildGuestRow(g)));
    }
  }

  function buildGuestRow(g) {
    const allIn = g.checked_in_count >= g.quantity;
    const row = document.createElement('div');
    row.className = 'guest-row' + (allIn ? ' checked-in' : '');

    let controlsHTML;

    if (allIn) {
      // Checked in — show undo button or undo confirmation
      if (undoId === g.id) {
        controlsHTML = `
          <div class="undo-confirm">
            <span class="undo-msg">Undo check-in for ${g.buyer_name || 'this guest'}?</span>
            <button class="btn btn-sm btn-red" data-undo-yes="1">Yes, undo</button>
            <button class="btn btn-sm" data-undo-no="1">Cancel</button>
          </div>
        `;
      } else {
        controlsHTML = `
          <div class="checkin-controls">
            <button class="btn btn-sm btn-red" data-undo-start="1">Undo check-in</button>
          </div>
        `;
      }
    } else {
      // Not checked in — show +/- and check in all
      controlsHTML = `
        <div class="checkin-controls">
          <button class="qty-btn" data-dir="-1" ${g.checked_in_count <= 0 ? 'disabled' : ''}>&#8722;</button>
          <span class="checkin-count">${g.checked_in_count}</span>
          <button class="qty-btn" data-dir="1" ${g.checked_in_count >= g.quantity ? 'disabled' : ''}>+</button>
          <button class="btn btn-sm" data-all="1" style="margin-left:auto">Check in all</button>
        </div>
      `;
    }

    row.innerHTML = `
      <div class="guest-top">
        <div class="guest-name">${g.buyer_name || 'Unknown'}${g.order_number ? ` <span style="font-size:.66rem;color:var(--green-dim)">${g.order_number}</span>` : ''}</div>
        <div class="guest-info">${g.quantity} ticket${g.quantity > 1 ? 's' : ''}</div>
        <div class="guest-status ${allIn ? 'in' : 'out'}">${allIn ? 'CHECKED IN' : g.checked_in_count > 0 ? g.checked_in_count + '/' + g.quantity + ' IN' : 'NOT IN'}</div>
      </div>
      ${controlsHTML}
    `;

    // +/- buttons (no confirmation needed, just increment/decrement)
    row.querySelectorAll('.qty-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const dir = parseInt(btn.dataset.dir);
        const newCount = Math.max(0, Math.min(g.quantity, g.checked_in_count + dir));
        updateCheckin(g.id, newCount);
      });
    });

    // Check in all button
    const allBtn = row.querySelector('[data-all]');
    if (allBtn) {
      allBtn.addEventListener('click', () => updateCheckin(g.id, g.quantity));
    }

    // Undo start
    const undoStartBtn = row.querySelector('[data-undo-start]');
    if (undoStartBtn) {
      undoStartBtn.addEventListener('click', () => {
        undoId = g.id;
        renderGuests();
      });
    }

    // Undo confirm yes
    const undoYesBtn = row.querySelector('[data-undo-yes]');
    if (undoYesBtn) {
      undoYesBtn.addEventListener('click', () => {
        undoId = null;
        updateCheckin(g.id, 0);
      });
    }

    // Undo confirm cancel
    const undoNoBtn = row.querySelector('[data-undo-no]');
    if (undoNoBtn) {
      undoNoBtn.addEventListener('click', () => {
        undoId = null;
        renderGuests();
      });
    }

    return row;
  }

  async function updateCheckin(orderId, count) {
    try {
      const res = await fetch(`${API}/checkin`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-staff-token': token },
        body: JSON.stringify({ order_id: orderId, count }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      // Re-fetch from server to ensure accurate counts
      await searchGuests(document.getElementById('search-input').value);
    } catch (err) {
      alert(err.message);
    }
  }

  // Init
  if (token && staffInfo) {
    showCheckinPanel();
  } else {
    document.getElementById('login-section').style.display = 'block';
  }
</script>
</body>
</html>
