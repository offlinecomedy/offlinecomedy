<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OFFLINE COMEDY — SHOW DETAIL</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --green:#00ff41; --green-dim:#00b32c; --green-dark:#003b0f; --yellow:#ffd700; --red:#ff4444; --bg:#050505; }
    body { background:var(--bg); color:var(--green); font-family:'Share Tech Mono','Courier New',monospace; min-height:100vh; display:flex; align-items:flex-start; justify-content:center; padding:2rem 1rem; }
    body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,rgba(0,255,65,.025) 0px,rgba(0,255,65,.025) 1px,transparent 1px,transparent 2px); pointer-events:none; z-index:999; }
    .terminal { width:100%; max-width:740px; border:1px solid var(--green-dim); border-radius:4px; box-shadow:0 0 24px rgba(0,255,65,.18); overflow:hidden; }
    .terminal-bar { background:var(--green-dark); border-bottom:1px solid var(--green-dim); padding:8px 14px; display:flex; align-items:center; gap:10px; }
    .dots { display:flex; gap:6px; }
    .dot { width:11px; height:11px; border-radius:50%; background:var(--green-dim); opacity:.45; }
    .dot-close { cursor:pointer; transition:background .15s, opacity .15s; }
    .dot-close:hover { background:#ff4444; opacity:1; }
    .terminal-title { flex:1; text-align:center; font-size:.68rem; color:var(--green-dim); letter-spacing:.18em; }
    .terminal-body { padding:1.4rem 1.6rem 2rem; background:var(--bg); }
    .ln { font-size:.82rem; line-height:1.65; }
    .dim { color:var(--green-dim); }
    .bright { color:var(--green); text-shadow:0 0 8px rgba(0,255,65,.55); }
    .yellow { color:var(--yellow); }
    .sep { border:none; border-top:1px solid var(--green-dark); margin:1rem 0; }
    .row { font-size:.78rem; line-height:1.9; color:var(--green-dim); }
    .row em { color:var(--green); font-style:normal; }
    .row.loc em { color:var(--yellow); }
    .section-label { font-size:.72rem; color:var(--green-dim); letter-spacing:.15em; margin:1rem 0 .4rem; text-transform:uppercase; }
    .badge { display:inline-block; font-size:.68rem; padding:.15rem .5rem; border:1px solid; border-radius:2px; letter-spacing:.1em; }
    .badge.draft { border-color:var(--green-dim); color:var(--green-dim); }
    .badge.announced { border-color:var(--yellow); color:var(--yellow); }
    .badge.completed { border-color:var(--green); color:var(--green); }
    textarea { background:#0a0a0a; border:1px solid var(--green-dark); color:var(--green); font-family:inherit; font-size:.82rem; width:100%; padding:.5rem; min-height:80px; resize:vertical; outline:none; }
    textarea:focus { border-color:var(--green); }
    textarea::placeholder { color:#1c4827; }
    .btn { background:transparent; border:1px solid var(--green); color:var(--green); font-family:inherit; font-size:.78rem; padding:.5rem 1rem; cursor:pointer; letter-spacing:.15em; text-transform:uppercase; transition:background .18s, box-shadow .18s, color .18s; }
    .btn:hover { background:var(--green); color:#000; box-shadow:0 0 18px rgba(0,255,65,.4); }
    .btn:disabled { opacity:.4; cursor:not-allowed; }
    .btn-orange { border-color:#ff8c00; color:#ff8c00; }
    .btn-orange:hover { background:#ff8c00; color:#000; box-shadow:0 0 18px rgba(255,140,0,.4); }
    .btn-dim { border-color:var(--green-dim); color:var(--green-dim); }
    .btn-dim:hover { background:var(--green-dim); color:#000; }
    .btn-row { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.5rem; }
    .flash { font-size:.76rem; padding:.4rem .7rem; border:1px solid; margin:.5rem 0; display:none; }
    .flash.err { border-color:var(--red); color:var(--red); }
    .flash.ok { border-color:var(--green); color:var(--green); }
    .flash.show { display:block; }
    .back-link { display:inline-block; margin-top:1.2rem; font-size:.75rem; color:var(--green-dim); text-decoration:none; letter-spacing:.1em; }
    .back-link:hover { color:var(--green); }
    .stat-row { display:flex; gap:1.5rem; flex-wrap:wrap; margin:.5rem 0; }
    .stat { font-size:.74rem; color:var(--green-dim); }
    .stat em { color:var(--green); font-style:normal; font-size:.88rem; }
    .link-box { border:1px solid var(--green-dark); padding:.6rem .8rem; background:rgba(0,255,65,.02); margin-top:.5rem; }
    .link-box input { background:transparent; border:none; color:var(--green); font-family:inherit; font-size:.76rem; width:100%; outline:none; }
    .link-box .copy-btn { font-size:.68rem; color:var(--green-dim); cursor:pointer; text-decoration:underline; margin-top:.3rem; display:inline-block; }
    .link-box .copy-btn:hover { color:var(--green); }
    .cur { display:inline-block; width:8px; height:.9em; background:var(--green); vertical-align:text-bottom; animation:blink 1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>
<div id="ocean-overlay" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:10000;background:#000;overflow:hidden"><iframe id="ocean-iframe" style="position:absolute;top:50%;left:50%;width:120vw;height:120vh;transform:translate(-50%,-50%);border:none;pointer-events:none" allow="autoplay" allowfullscreen></iframe><div id="ocean-click-layer" style="position:absolute;inset:0;z-index:1;cursor:pointer"></div></div>
<div class="terminal">
  <div class="terminal-bar">
    <div class="dots"><div class="dot dot-close" onclick="smartClose()" title="Close"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="terminal-title">offlinecomedy.com — show_detail.enc</div>
  </div>
  <div class="terminal-body">
    <div id="loading"><div class="ln dim">$ loading show<span class="cur"></span></div></div>
    <div id="content" style="display:none"></div>
    <a href="manage-shows.html" class="back-link">&lt; back to shows</a>
    <div style="margin-top:1rem"><span class="ln dim">&gt; </span><span class="cur"></span></div>
  </div>
</div>

<script>
  const API = 'https://offlinecomedy-backend.vercel.app/api';
  const params = new URLSearchParams(window.location.search);
  const showId = params.get('id');
  const adminKey = sessionStorage.getItem('oc_admin_key');

  if (!adminKey) {
    window.location.href = 'manage-shows.html';
  }

  let show = null;

  function flash(id, msg, type) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = '$ ' + msg;
    el.className = `flash ${type} show`;
  }

  async function loadShow() {
    if (!showId) {
      document.getElementById('loading').innerHTML = '<div class="ln yellow">$ no show specified</div>';
      return;
    }

    try {
      const res = await fetch(`${API}/admin-shows?id=${showId}`, {
        headers: { 'x-admin-key': adminKey },
      });
      show = await res.json();
      if (!res.ok) throw new Error(show.error);
      renderShow();
    } catch (err) {
      document.getElementById('loading').innerHTML = `<div class="ln yellow">$ ${err.message}</div>`;
    }
  }

  function badgeHTML(status) {
    return `<span class="badge ${status}">${status.toUpperCase()}</span>`;
  }

  function renderShow() {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('content');
    el.style.display = 'block';

    const ticketsSold = show.tickets_sold || 0;
    const remaining = show.tickets_remaining;

    const ticketLink = `https://offlinecomedy.com/tickets.html?show_id=${show.id}`;
    const checkinLink = `https://offlinecomedy.com/checkin.html`;
    const guestLink = `https://offlinecomedy.com/mytickets.html`;

    el.innerHTML = `
      <div class="ln bright" style="margin-bottom:.5rem">[ ${show.city.toUpperCase()} — ${show.date} ]</div>
      <div style="margin-bottom:.8rem">${badgeHTML(show.status)}</div>

      <div class="row">DATE ............. <em>${show.date}</em></div>
      <div class="row">CITY ............. <em>${show.city.toUpperCase()}</em></div>
      ${show.show_time ? `<div class="row">TIME ............. <em>${show.show_time}</em></div>` : ''}
      <div class="row">PRICE ............ <em>$${(show.ticket_price_cents / 100).toFixed(0)}</em></div>
      ${show.venue_type ? `<div class="row">VENUE TYPE ....... <em>${show.venue_type}</em></div>` : ''}
      ${show.age_requirement ? `<div class="row">AGE .............. <em>${show.age_requirement}</em></div>` : ''}
      ${show.drinks ? `<div class="row">DRINKS ........... <em>${show.drinks}</em></div>` : ''}
      ${show.capacity ? `<div class="row">CAPACITY ......... <em>${show.capacity}</em></div>` : ''}

      <div class="stat-row" style="margin-top:.6rem">
        ${remaining !== null ? `<div class="stat">SOLD<br><em>${ticketsSold}</em></div><div class="stat">REMAINING<br><em>${remaining}</em></div>` : ''}
        ${show.historical_tickets_sold ? `<div class="stat">HIST. TICKETS<br><em>${show.historical_tickets_sold}</em></div>` : ''}
        ${show.gross_sales_cents ? `<div class="stat">GROSS SALES<br><em>$${(show.gross_sales_cents / 100).toLocaleString()}</em></div>` : ''}
      </div>

      <hr class="sep" />

      <!-- Lineup -->
      <div class="section-label">lineup</div>
      <div id="lineup-list"><div class="ln dim">Loading...</div></div>

      <hr class="sep" />

      <!-- Ticket Link for Guests -->
      <div class="section-label">ticket purchase link</div>
      <div class="link-box">
        <input type="text" id="ticket-link" value="${ticketLink}" readonly onclick="this.select()" />
        <span class="copy-btn" onclick="copyLink('ticket-link')">copy link</span>
      </div>

      <!-- Guest Ticket Page Link -->
      <div class="section-label">guest ticket page</div>
      <div class="link-box">
        <input type="text" id="guest-link" value="${guestLink}" readonly onclick="this.select()" />
        <span class="copy-btn" onclick="copyLink('guest-link')">copy link</span>
      </div>

      <hr class="sep" />

      <!-- Day-of Message -->
      <div class="section-label">day-of message</div>
      ${show.day_of_sent
        ? `<div class="ln dim" style="font-size:.74rem; margin-bottom:.3rem">&#10003; Already sent</div>`
        : ''}
      <textarea id="day-of-msg" placeholder="Hey! Here are your show details for tonight...">${show.day_of_message || ''}</textarea>
      <div class="btn-row">
        <button class="btn btn-dim" id="save-dayof-btn" style="font-size:.72rem; padding:.4rem .8rem;">Save message</button>
        ${!show.day_of_sent ? `<button class="btn btn-orange" id="send-dayof-btn" style="font-size:.72rem; padding:.4rem .8rem;">Send day-of now</button>` : ''}
        <button class="btn btn-dim" id="prepop-btn" style="font-size:.72rem; padding:.4rem .8rem;">Pre-fill venue info</button>
      </div>
      <div id="dayof-flash" class="flash"></div>

      <hr class="sep" />

      <!-- Message Guests -->
      <div class="section-label">message guests</div>
      <textarea id="msg-text" placeholder="Type a message to all ticket holders..."></textarea>
      <div class="btn-row">
        <button class="btn" id="send-msg-btn" style="font-size:.72rem; padding:.4rem .8rem;">Send message</button>
      </div>
      <div id="msg-flash" class="flash"></div>

      <hr class="sep" />

      <!-- Status Change -->
      <div class="section-label">status</div>
      <div class="btn-row">
        ${show.status !== 'completed' ? `<button class="btn" id="mark-complete-btn" style="font-size:.72rem; padding:.4rem .8rem;">Mark as completed</button>` : ''}
        ${show.status === 'draft' ? `<button class="btn btn-orange" id="mark-announced-btn" style="font-size:.72rem; padding:.4rem .8rem;">Mark as announced</button>` : ''}
      </div>
      <div id="status-flash" class="flash"></div>

      <hr class="sep" />

      <!-- Navigation -->
      <div class="section-label">actions</div>
      <div class="btn-row">
        <button class="btn btn-dim" onclick="window.location.href='manage-shows.html?edit=${showId}'" style="font-size:.72rem; padding:.4rem .8rem;">&#9998; Edit show</button>
        <a href="${checkinLink}" class="btn btn-dim" style="font-size:.72rem; padding:.4rem .8rem; text-decoration:none;">&#10003; Guest check-in</a>
        <button class="btn" id="delete-show-btn" style="font-size:.72rem; padding:.4rem .8rem; border-color:var(--red); color:var(--red);">&#10005; Delete show</button>
      </div>
    `;

    // Load lineup
    loadLineup();

    // Status buttons
    const markCompleteBtn = document.getElementById('mark-complete-btn');
    if (markCompleteBtn) markCompleteBtn.addEventListener('click', () => changeStatus('completed'));
    const markAnnouncedBtn = document.getElementById('mark-announced-btn');
    if (markAnnouncedBtn) markAnnouncedBtn.addEventListener('click', () => changeStatus('announced'));

    // Delete button
    document.getElementById('delete-show-btn').addEventListener('click', deleteShow);

    // Wire up buttons
    document.getElementById('save-dayof-btn').addEventListener('click', saveDayOf);
    const sendDayOfBtn = document.getElementById('send-dayof-btn');
    if (sendDayOfBtn) sendDayOfBtn.addEventListener('click', sendDayOf);
    document.getElementById('prepop-btn').addEventListener('click', preFillVenue);
    document.getElementById('send-msg-btn').addEventListener('click', sendMessage);

    // Pre-fill day-of message with venue if empty
    if (!show.day_of_message) {
      preFillVenue();
    }
  }

  async function changeStatus(newStatus) {
    if (!confirm(`Change show status to "${newStatus}"?`)) return;
    try {
      const res = await fetch(`${API}/admin-shows`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
        body: JSON.stringify({ id: showId, status: newStatus }),
      });
      if (!res.ok) { const d = await res.json(); throw new Error(d.error); }
      flash('status-flash', `Status changed to ${newStatus}`, 'ok');
      setTimeout(() => location.reload(), 1000);
    } catch (err) {
      flash('status-flash', err.message, 'err');
    }
  }

  async function deleteShow() {
    if (!confirm('Are you sure you want to delete this show? This cannot be undone.')) return;
    if (!confirm('REALLY delete? All bookings, orders, and comedian links will be removed.')) return;
    try {
      const res = await fetch(`${API}/admin-shows`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
        body: JSON.stringify({ id: showId }),
      });
      if (!res.ok) { const d = await res.json(); throw new Error(d.error); }
      window.location.href = 'manage-shows.html';
    } catch (err) {
      alert(err.message);
    }
  }

  async function loadLineup() {
    const el = document.getElementById('lineup-list');
    try {
      const res = await fetch(`${API}/show-bookings?show_id=${showId}`, {
        headers: { 'x-admin-key': adminKey },
      });
      const bookings = await res.json();
      if (!res.ok) throw new Error(bookings.error);

      if (bookings.length === 0) {
        el.innerHTML = '<div class="ln dim">$ no comedians booked for this show</div>';
        return;
      }

      // Sort: headliners first, then by title
      const order = { 'Closer/Headliner': 0, 'Feature': 1, 'Host': 2, 'Guest spot': 3 };
      bookings.sort((a, b) => {
        const aOrder = order[a.title] !== undefined ? order[a.title] : 4;
        const bOrder = order[b.title] !== undefined ? order[b.title] : 4;
        return aOrder - bOrder;
      });

      const ratingColors = {
        5: 'var(--green)',
        4: 'var(--green)',
        3: 'var(--green-dim)',
        2: 'var(--yellow)',
        1: 'var(--red)',
      };

      el.innerHTML = '';
      bookings.forEach(b => {
        const c = b.comedians;
        const name = c ? c.name : 'Unknown';
        const followers = c && c.followers ? c.followers.toLocaleString() : '';
        const rate = b.rate_cents ? '$' + (b.rate_cents / 100).toFixed(0) : '';
        const ratingColor = ratingColors[b.rating] || 'var(--green-dim)';
        const statusBadge = b.status === 'cancelled'
          ? '<span style="color:var(--red);font-size:.68rem;"> CANCELLED</span>'
          : '';

        const isPaid = b.payment_status === 'paid';
        const canPay = !isPaid && b.rate_cents && b.status !== 'cancelled' && show.status === 'completed';
        const hasStripe = c && c.stripe_account_id && c.onboarding_status === 'complete';

        let payHTML = '';
        if (isPaid) {
          payHTML = `<span style="font-size:.66rem; padding:.1rem .35rem; border:1px solid var(--green); color:var(--green); border-radius:2px;">PAID</span>`;
        } else if (canPay && hasStripe) {
          payHTML = `<button class="pay-btn" data-booking-id="${b.id}" data-name="${name}" data-amount="${rate}" style="font-size:.66rem; padding:.2rem .5rem; border:1px solid var(--yellow); color:var(--yellow); background:transparent; font-family:inherit; cursor:pointer; letter-spacing:.1em;">PAY ${rate}</button>`;
        } else if (canPay && !hasStripe) {
          payHTML = `<span style="font-size:.64rem; color:var(--red);">NO 1099</span> <button class="remind-btn" data-comedian-id="${c.id}" data-name="${name}" style="font-size:.64rem; padding:.15rem .4rem; border:1px solid var(--red); color:var(--red); background:transparent; font-family:inherit; cursor:pointer; margin-left:.3rem;">REMIND</button>`;
        }

        const card = document.createElement('div');
        card.style.cssText = `border:1px solid var(--green-dark); padding:.5rem .7rem; margin-bottom:.4rem; background:rgba(0,255,65,.02); ${b.status === 'cancelled' ? 'opacity:.5;' : ''}`;
        card.innerHTML = `
          <div style="display:flex; align-items:center; gap:.6rem; flex-wrap:wrap;">
            <a href="${c ? 'admin-comedian.html?id=' + c.id : '#'}" style="font-size:.82rem; color:var(--green); text-decoration:none;">${name}</a>
            ${statusBadge}
            <span style="font-size:.68rem; color:var(--green-dim); margin-left:auto;">${b.title || ''}</span>
            ${payHTML}
          </div>
          <div style="display:flex; gap:1rem; flex-wrap:wrap; font-size:.7rem; color:var(--green-dim); margin-top:.25rem;">
            ${rate ? `<span>RATE: <em style="color:var(--green)">${rate}</em></span>` : ''}
            ${b.rating ? `<span>RATING: <em style="color:${ratingColor}">${b.rating}/5 ${b.rating_label || ''}</em></span>` : ''}
            ${b.set_minutes ? `<span>SET: <em style="color:var(--green)">${b.set_minutes}min</em></span>` : ''}
            ${followers ? `<span>FOLLOWERS: <em style="color:var(--green)">${followers}</em></span>` : ''}
          </div>
          ${b.notes ? `<div style="font-size:.68rem; color:var(--green-dim); margin-top:.3rem; font-style:italic;">${b.notes}</div>` : ''}
          <div class="pay-flash" style="font-size:.68rem; margin-top:.2rem; min-height:.5em;"></div>
        `;

        // Wire up pay button
        const payBtn = card.querySelector('.pay-btn');
        if (payBtn) {
          payBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const bId = payBtn.dataset.bookingId;
            const bName = payBtn.dataset.name;
            const bAmount = payBtn.dataset.amount;
            if (!confirm(`Pay ${bName} ${bAmount} via Stripe?`)) return;

            payBtn.disabled = true;
            payBtn.textContent = 'Processing...';
            const flashEl = card.querySelector('.pay-flash');

            try {
              const res = await fetch(`${API}/connect-payout`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
                body: JSON.stringify({ booking_id: bId }),
              });
              const data = await res.json();
              if (!res.ok) throw new Error(data.error);

              payBtn.outerHTML = '<span style="font-size:.66rem; padding:.1rem .35rem; border:1px solid var(--green); color:var(--green); border-radius:2px;">PAID</span>';
              flashEl.textContent = '$ Payment sent';
              flashEl.style.color = 'var(--green)';
            } catch (err) {
              flashEl.textContent = '$ ' + err.message;
              flashEl.style.color = 'var(--red)';
              payBtn.disabled = false;
              payBtn.textContent = `PAY ${bAmount}`;
            }
          });
        }

        // Wire up remind button
        const remindBtn = card.querySelector('.remind-btn');
        if (remindBtn) {
          remindBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const cId = remindBtn.dataset.comedianId;
            const cName = remindBtn.dataset.name;
            if (!confirm(`Send 1099 reminder to ${cName}?`)) return;

            remindBtn.disabled = true;
            remindBtn.textContent = 'Sending...';
            const flashEl = card.querySelector('.pay-flash');

            try {
              const res = await fetch(`${API}/connect-remind`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
                body: JSON.stringify({ comedian_id: cId }),
              });
              const data = await res.json();
              if (!res.ok) throw new Error(data.error);

              remindBtn.textContent = 'SENT';
              remindBtn.style.borderColor = 'var(--green)';
              remindBtn.style.color = 'var(--green)';
              flashEl.textContent = '$ Reminder sent';
              flashEl.style.color = 'var(--green)';
            } catch (err) {
              flashEl.textContent = '$ ' + err.message;
              flashEl.style.color = 'var(--red)';
              remindBtn.disabled = false;
              remindBtn.textContent = 'REMIND';
            }
          });
        }

        el.appendChild(card);
      });
    } catch (err) {
      el.innerHTML = `<div class="ln yellow">$ ${err.message}</div>`;
    }
  }

  function preFillVenue() {
    const textarea = document.getElementById('day-of-msg');
    const v = show.venues;

    let msg = `Tonight's the night! Here are your Offline Comedy show details:\n\n`;
    if (v) {
      msg += `Location: ${v.name}\n${v.address}\n${v.city}, ${v.state} ${v.zip_code}\n`;
    } else {
      msg += `Location: ${show.city} (full address coming soon)\n`;
    }
    msg += `Time: ${show.show_time || 'TBD'}\n`;
    msg += `\nREMINDER: This is an offline experience. No phone usage is permitted during the show. Phones must be stored away upon entry.\n`;
    msg += `\nSee you there!`;
    textarea.value = msg;
  }

  async function saveDayOf() {
    const msg = document.getElementById('day-of-msg').value.trim();
    const btn = document.getElementById('save-dayof-btn');
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/admin-shows`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
        body: JSON.stringify({ id: showId, day_of_message: msg || null }),
      });
      if (!res.ok) { const d = await res.json(); throw new Error(d.error); }
      show.day_of_message = msg;
      flash('dayof-flash', 'Saved!', 'ok');
    } catch (err) {
      flash('dayof-flash', err.message, 'err');
    }
    btn.disabled = false;
  }

  async function sendDayOf() {
    // Save first
    await saveDayOf();
    if (!show.day_of_message) {
      flash('dayof-flash', 'Write a message first', 'err');
      return;
    }
    if (!confirm('Send day-of message to all ticket holders?')) return;

    try {
      const res = await fetch(`${API}/send-day-of`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
        body: JSON.stringify({ show_id: showId }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      flash('dayof-flash', `Sent to ${data.sent} guest(s)!`, 'ok');
      show.day_of_sent = true;
    } catch (err) {
      flash('dayof-flash', err.message, 'err');
    }
  }

  async function sendMessage() {
    const msg = document.getElementById('msg-text').value.trim();
    if (!msg) { flash('msg-flash', 'Message cannot be empty', 'err'); return; }
    if (!confirm('Send this message to all ticket holders?')) return;

    const btn = document.getElementById('send-msg-btn');
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/message-guests`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
        body: JSON.stringify({ show_id: showId, message: msg }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      flash('msg-flash', `Sent to ${data.sent} of ${data.total} guest(s)`, 'ok');
      document.getElementById('msg-text').value = '';
    } catch (err) {
      flash('msg-flash', err.message, 'err');
    }
    btn.disabled = false;
  }

  function copyLink(inputId) {
    const input = document.getElementById(inputId);
    input.select();
    navigator.clipboard.writeText(input.value);
    input.style.color = 'var(--yellow)';
    setTimeout(() => { input.style.color = ''; }, 800);
  }

  loadShow();
</script>
