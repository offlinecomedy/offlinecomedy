<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OFFLINE COMEDY — ADMIN</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #00ff41;
      --green-dim:  #00b32c;
      --green-dark: #003b0f;
      --yellow:     #ffd700;
      --red:        #ff4444;
      --bg:         #050505;
    }

    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, rgba(0,255,65,.025) 0px, rgba(0,255,65,.025) 1px, transparent 1px, transparent 2px);
      pointer-events: none; z-index: 999;
    }

    .terminal {
      width: 100%; max-width: 860px;
      border: 1px solid var(--green-dim);
      border-radius: 4px;
      box-shadow: 0 0 24px rgba(0,255,65,.18), 0 0 80px rgba(0,255,65,.06);
      overflow: hidden;
    }

    .terminal-bar {
      background: var(--green-dark);
      border-bottom: 1px solid var(--green-dim);
      padding: 8px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .dots { display: flex; gap: 6px; }
    .dot  { width: 11px; height: 11px; border-radius: 50%; background: var(--green-dim); opacity: .45; }
    .terminal-title { flex: 1; text-align: center; font-size: .68rem; color: var(--green-dim); letter-spacing: .18em; }

    .terminal-body { padding: 1.4rem 1.6rem 2rem; background: var(--bg); }

    .ln { font-size: .82rem; line-height: 1.65; }
    .dim    { color: var(--green-dim); }
    .bright { color: var(--green); text-shadow: 0 0 8px rgba(0,255,65,.55); }
    .yellow { color: var(--yellow); }
    .red    { color: var(--red); }

    .sep { border: none; border-top: 1px solid var(--green-dark); margin: 1.1rem 0; }

    /* ── Auth screen ── */
    #auth-screen { }
    #main-screen { display: none; }

    .form-group { margin-bottom: 1rem; }
    .form-label {
      display: block; font-size: .74rem; color: var(--green-dim);
      margin-bottom: .3rem; letter-spacing: .07em;
    }
    .form-label em { color: var(--green); font-style: normal; }

    .input-row {
      display: flex; align-items: center;
      border: 1px solid var(--green-dark); background: #0a0a0a;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-row:focus-within { border-color: var(--green); box-shadow: 0 0 10px rgba(0,255,65,.2); }
    .input-pfx { padding: .5rem .65rem; color: var(--green-dim); font-size: .85rem; user-select: none; }

    input[type="text"],
    input[type="password"],
    input[type="number"],
    select {
      background: transparent; border: none; outline: none;
      color: var(--green); font-family: inherit; font-size: .88rem;
      width: 100%; padding: .5rem .5rem .5rem 0; caret-color: var(--green);
    }
    input::placeholder { color: #1c4827; }

    select { cursor: pointer; }
    select option { background: #0a0a0a; color: var(--green); }

    .btn {
      background: transparent; border: 1px solid var(--green);
      color: var(--green); font-family: inherit; font-size: .84rem;
      padding: .65rem 1.2rem; cursor: pointer; letter-spacing: .18em;
      text-transform: uppercase; transition: background .18s, box-shadow .18s, color .18s;
    }
    .btn:hover  { background: var(--green); color: #000; box-shadow: 0 0 18px rgba(0,255,65,.4); }
    .btn:active { transform: scale(.99); }
    .btn::before { content: '> '; }
    .btn.full { width: 100%; }

    .btn.red-btn { border-color: var(--red); color: var(--red); font-size: .72rem; padding: .4rem .8rem; }
    .btn.red-btn:hover { background: var(--red); color: #000; box-shadow: none; }
    .btn.red-btn::before { content: ''; }

    .btn.yellow-btn { border-color: var(--yellow); color: var(--yellow); font-size: .72rem; padding: .4rem .8rem; }
    .btn.yellow-btn:hover { background: var(--yellow); color: #000; box-shadow: none; }
    .btn.yellow-btn::before { content: ''; }

    .flash {
      font-size: .78rem; padding: .5rem .8rem;
      border: 1px solid; margin-bottom: 1rem; display: none;
    }
    .flash.ok  { border-color: var(--green); color: var(--green); }
    .flash.err { border-color: var(--red); color: var(--red); }
    .flash.show { display: block; }

    /* ── Shows table ── */
    .shows-table { width: 100%; border-collapse: collapse; font-size: .76rem; margin-top: .6rem; }
    .shows-table th {
      color: var(--green-dim); text-align: left; padding: .35rem .6rem;
      border-bottom: 1px solid var(--green-dark); letter-spacing: .08em;
    }
    .shows-table td { padding: .45rem .6rem; border-bottom: 1px solid #0d0d0d; vertical-align: middle; }
    .shows-table tr:last-child td { border-bottom: none; }
    .shows-table tr:hover td { background: rgba(0,255,65,.03); }

    .badge {
      font-size: .65rem; padding: .15rem .5rem; border: 1px solid;
      letter-spacing: .1em; text-transform: uppercase;
    }
    .badge.draft     { border-color: var(--green-dim); color: var(--green-dim); }
    .badge.announced { border-color: var(--yellow); color: var(--yellow); }
    .badge.completed { border-color: #444; color: #444; }

    .action-btns { display: flex; gap: .5rem; flex-wrap: wrap; }

    #new-show-section { display: none; margin-top: 1.4rem; }
    #new-show-section.open { display: block; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 0 1.2rem; }

    .toggle-btn {
      background: none; border: 1px solid var(--green-dark);
      color: var(--green-dim); font-family: inherit; font-size: .76rem;
      padding: .45rem .9rem; cursor: pointer; letter-spacing: .12em;
      transition: border-color .15s, color .15s;
    }
    .toggle-btn:hover, .toggle-btn.active { border-color: var(--green); color: var(--green); }
    .toggle-btn::before { content: '+ '; }
    .toggle-btn.active::before { content: '- '; }

    .cur {
      display: inline-block; width: 8px; height: .9em;
      background: var(--green); vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>

<div class="terminal">
  <div class="terminal-bar">
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="terminal-title">offlinecomedy.com — admin.enc</div>
  </div>

  <div class="terminal-body">

    <!-- ── Auth screen ── -->
    <div id="auth-screen">
      <div class="ln bright" style="margin-bottom:1rem">[ RESTRICTED ACCESS ]</div>
      <div class="ln dim" style="margin-bottom:1.4rem">Enter admin key to continue.</div>

      <div id="auth-flash" class="flash"></div>

      <div class="form-group">
        <label class="form-label" for="admin-key-input"><em>ADMIN_KEY</em></label>
        <div class="input-row">
          <span class="input-pfx">$&gt;</span>
          <input type="password" id="admin-key-input" placeholder="••••••••••••••••••••••" autocomplete="current-password" />
        </div>
      </div>
      <button class="btn full" id="auth-btn">Authenticate</button>
    </div>

    <!-- ── Main screen ── -->
    <div id="main-screen">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.2rem">
        <span class="ln bright">[ SHOW MANAGEMENT ]</span>
        <button class="btn" id="logout-btn" style="font-size:.7rem;padding:.35rem .8rem;letter-spacing:.12em">Logout</button>
      </div>

      <hr class="sep" />

      <div id="main-flash" class="flash"></div>

      <!-- Shows list -->
      <div id="shows-container">
        <div class="ln dim">$ loading shows...</div>
      </div>

      <!-- New show toggle -->
      <div style="margin-top:1.2rem">
        <button class="toggle-btn" id="toggle-new-show">New Show</button>
      </div>

      <!-- New show form -->
      <div id="new-show-section">
        <hr class="sep" />
        <div id="form-mode-label" class="ln yellow" style="margin-bottom:1rem">[ CREATE SHOW ]</div>

        <!-- Row: Date + City -->
        <div class="two-col">
          <div class="form-group">
            <label class="form-label" for="s-date"><em>DATE</em>  // e.g. 4.15.26</label>
            <div class="input-row">
              <span class="input-pfx">$&gt;</span>
              <input type="text" id="s-date" placeholder="4.15.26" />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="s-time"><em>SHOW_TIME</em>  // e.g. 8:00 PM</label>
            <div class="input-row">
              <span class="input-pfx">$&gt;</span>
              <input type="text" id="s-time" placeholder="8:00 PM" />
            </div>
          </div>
        </div>

        <!-- Row: City + Capacity -->
        <div class="two-col">
          <div class="form-group">
            <label class="form-label" for="s-city"><em>CITY</em></label>
            <div class="input-row">
              <span class="input-pfx">$&gt;</span>
              <input type="text" id="s-city" placeholder="Turlock" />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="s-capacity"><em>CAPACITY</em></label>
            <div class="input-row">
              <span class="input-pfx">$&gt;</span>
              <input type="number" id="s-capacity" placeholder="75" min="1" />
            </div>
          </div>
        </div>

        <!-- Row: Location ZIP + Ticket Price -->
        <div class="two-col">
          <div class="form-group">
            <label class="form-label" for="s-loc-zip"><em>LOCATION_ZIP</em>  // notify zips auto-fill</label>
            <div class="input-row">
              <span class="input-pfx">$&gt;</span>
              <input type="text" id="s-loc-zip" placeholder="95380" maxlength="10" autocomplete="off" />
            </div>
            <div id="zip-radius-status" style="font-size:.7rem;color:var(--green-dim);margin-top:.3rem;min-height:1rem"></div>
          </div>
          <div class="form-group">
            <label class="form-label" for="s-price"><em>TICKET_PRICE</em>  // dollars</label>
            <div class="input-row">
              <span class="input-pfx">$&gt;</span>
              <input type="number" id="s-price" placeholder="20" min="1" step="1" />
            </div>
          </div>
        </div>

        <!-- Row: Venue type + Age -->
        <div class="two-col">
          <div class="form-group">
            <label class="form-label" for="s-venue-type"><em>VENUE_TYPE</em></label>
            <div class="input-row">
              <span class="input-pfx">$&gt;</span>
              <select id="s-venue-type">
                <option value="">— select —</option>
                <option value="indoor">Indoor</option>
                <option value="outdoor">Outdoor</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="s-age"><em>AGE_REQUIREMENT</em></label>
            <div class="input-row">
              <span class="input-pfx">$&gt;</span>
              <select id="s-age">
                <option value="">— select —</option>
                <option value="all_ages">All Ages</option>
                <option value="18+">18+</option>
                <option value="21+">21+</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Row: Drinks + Status -->
        <div class="two-col">
          <div class="form-group">
            <label class="form-label" for="s-drinks"><em>DRINKS</em></label>
            <div class="input-row">
              <span class="input-pfx">$&gt;</span>
              <select id="s-drinks">
                <option value="">— select —</option>
                <option value="byob">BYOB</option>
                <option value="for_sale">For Sale</option>
                <option value="not_available">Not Available</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="s-status"><em>STATUS</em></label>
            <div class="input-row">
              <span class="input-pfx">$&gt;</span>
              <select id="s-status">
                <option value="draft">draft</option>
                <option value="announced">announced</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Day-of Message -->
        <div class="form-group">
          <label class="form-label" for="s-day-msg"><em>DAY-OF MESSAGE</em>  // sent to ticket holders 24hrs before show</label>
          <textarea id="s-day-msg" placeholder="Hey! Here are your show details for tonight..." style="background:#0a0a0a; border:1px solid var(--green-dark); color:var(--green); font-family:inherit; font-size:.82rem; width:100%; padding:.5rem; min-height:80px; resize:vertical; outline:none;"></textarea>
        </div>

        <!-- Notify ZIPs -->
        <div class="form-group">
          <label class="form-label" for="s-zips"><em>NOTIFY_ZIPS</em>  // auto-filled from location zip</label>
          <div class="input-row">
            <span class="input-pfx">$&gt;</span>
            <input type="text" id="s-zips" placeholder="95380, 95382, 95351" />
          </div>
        </div>

        <!-- Venue -->
        <div class="form-group">
          <label class="form-label"><em>VENUE</em>  // search existing or create new</label>
          <div style="display:flex;gap:.6rem;align-items:center">
            <div class="input-row" style="flex:1">
              <span class="input-pfx">$&gt;</span>
              <input type="text" id="s-venue-search" placeholder="search venue name..." autocomplete="off" />
            </div>
            <button type="button" class="btn" id="venue-search-btn" style="white-space:nowrap;padding:.5rem .9rem;font-size:.75rem">Search</button>
          </div>
          <div id="venue-results" style="margin-top:.4rem"></div>
          <input type="hidden" id="s-venue-id" />
          <div id="venue-selected" style="font-size:.75rem;color:var(--green);margin-top:.3rem;min-height:1rem"></div>

          <!-- Create new venue (hidden by default) -->
          <div id="new-venue-form" style="display:none;margin-top:.8rem;border-left:1px solid var(--green-dark);padding-left:1rem">
            <div class="ln dim" style="margin-bottom:.6rem;font-size:.74rem">// new venue</div>
            <div class="two-col">
              <div class="form-group">
                <label class="form-label" for="v-name"><em>NAME</em></label>
                <div class="input-row"><span class="input-pfx">$&gt;</span><input type="text" id="v-name" placeholder="The Burbank" /></div>
              </div>
              <div class="form-group">
                <label class="form-label" for="v-city"><em>CITY</em></label>
                <div class="input-row"><span class="input-pfx">$&gt;</span><input type="text" id="v-city" placeholder="Turlock" /></div>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="v-address"><em>ADDRESS</em></label>
              <div class="input-row"><span class="input-pfx">$&gt;</span><input type="text" id="v-address" placeholder="123 Main St" /></div>
            </div>
            <div class="two-col">
              <div class="form-group">
                <label class="form-label" for="v-zip"><em>ZIP</em></label>
                <div class="input-row"><span class="input-pfx">$&gt;</span><input type="text" id="v-zip" placeholder="95380" maxlength="10" /></div>
              </div>
              <div class="form-group">
                <label class="form-label" for="v-state"><em>STATE</em></label>
                <div class="input-row"><span class="input-pfx">$&gt;</span><input type="text" id="v-state" placeholder="CA" maxlength="2" /></div>
              </div>
            </div>
            <button type="button" class="btn yellow-btn" id="create-venue-btn">+ Save Venue</button>
          </div>
        </div>

        <!-- Comedians -->
        <div class="form-group">
          <label class="form-label"><em>COMEDIANS</em>  // add lineup</label>
          <div style="display:flex;gap:.6rem;align-items:center">
            <div class="input-row" style="flex:1;position:relative">
              <span class="input-pfx">$&gt;</span>
              <input type="text" id="s-comedian-search" placeholder="search or add by name..." autocomplete="off" />
            </div>
            <button type="button" class="btn" id="comedian-search-btn" style="white-space:nowrap;padding:.5rem .9rem;font-size:.75rem">Add</button>
          </div>
          <div id="comedian-results" style="margin-top:.4rem"></div>
          <div id="comedian-tags" style="display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem"></div>
        </div>
        <input type="hidden" id="s-comedian-ids" value="[]" />

        <div style="display:flex;gap:.6rem">
          <button class="btn" id="create-show-btn" style="flex:1">Create Show</button>
          <button class="btn" id="cancel-edit-btn" style="display:none;border-color:var(--green-dim);color:var(--green-dim);padding:.65rem 1rem;font-size:.78rem;letter-spacing:.1em">Cancel</button>
        </div>
      </div>

      <hr class="sep" style="margin-top:1.6rem" />
      <div class="ln dim">&gt; <span class="cur"></span></div>
    </div>

  </div>
</div>

<script>
  const API = 'https://offlinecomedy-backend.vercel.app/api';
  const KEY_STORE = 'oc_admin_key';

  let adminKey = sessionStorage.getItem(KEY_STORE) || '';

  // ── Helpers ────────────────────────────────────────────────────────────────
  function flash(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = '$ ' + msg;
    el.className = 'flash ' + type + ' show';
    setTimeout(() => el.classList.remove('show'), 4000);
  }

  function badgeHTML(status) {
    return `<span class="badge ${status}">${status}</span>`;
  }

  // ── Load & render shows ────────────────────────────────────────────────────
  async function loadShows() {
    const container = document.getElementById('shows-container');
    container.innerHTML = '<div class="ln dim">$ fetching shows...</div>';

    try {
      const res  = await fetch(`${API}/admin-shows`, {
        headers: { 'x-admin-key': adminKey },
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      if (!data.length) {
        container.innerHTML = '<div class="ln dim">$ no shows yet. create one below.</div>';
        return;
      }

      let html = `
        <table class="shows-table">
          <thead>
            <tr>
              <th>DATE</th>
              <th>CITY</th>
              <th>LOC ZIP</th>
              <th>PRICE</th>
              <th>STATUS</th>
              <th>TICKETS</th>
              <th>ACTIONS</th>
            </tr>
          </thead>
          <tbody>`;

      data.forEach(show => {
        const price = '$' + (show.ticket_price_cents / 100).toFixed(0);
        const ticketsHTML = show.capacity
          ? `<span style="color:var(--green)">${show.tickets_remaining}</span><span style="color:var(--green-dim)"> / ${show.capacity} remaining</span>`
          : '<span style="color:var(--green-dim)">—</span>';
        html += `
          <tr>
            <td style="color:var(--yellow)">${show.date}</td>
            <td>${show.city}</td>
            <td style="color:var(--green-dim)">${show.location_zip || '—'}</td>
            <td>${price}</td>
            <td>${badgeHTML(show.status)}</td>
            <td>${ticketsHTML}</td>
            <td>
              <div class="action-btns">
                ${show.status !== 'announced' && show.status !== 'completed'
                  ? `<button class="btn yellow-btn" onclick="announceShow('${show.id}', '${show.city}')">&#9654; Announce</button>`
                  : ''}
                <button class="btn" onclick="startEdit('${show.id}')" style="font-size:.72rem;padding:.4rem .8rem;border-color:var(--green-dim);color:var(--green-dim)">&#9998; Edit</button>
                ${show.day_of_message && !show.day_of_sent
                  ? `<button class="btn" onclick="sendDayOf('${show.id}', '${show.city}')" style="font-size:.72rem;padding:.4rem .8rem;border-color:#ff8c00;color:#ff8c00">&#9993; Send Day-Of</button>`
                  : show.day_of_sent
                  ? `<span style="font-size:.68rem;color:var(--green-dim)">&#10003; Day-of sent</span>`
                  : ''}
                <button class="btn" onclick="toggleMessageBox('${show.id}')" style="font-size:.72rem;padding:.4rem .8rem;border-color:var(--green-dim);color:var(--green-dim)">&#9993; Message</button>
              </div>
              <div id="msg-box-${show.id}" style="display:none; margin-top:.5rem;">
                <textarea id="msg-text-${show.id}" placeholder="Type your message to all ticket holders..." style="background:#0a0a0a; border:1px solid var(--green-dark); color:var(--green); font-family:inherit; font-size:.78rem; width:100%; padding:.4rem; min-height:60px; resize:vertical; outline:none;"></textarea>
                <div style="display:flex; gap:.4rem; margin-top:.3rem;">
                  <button class="btn" onclick="sendMessage('${show.id}')" style="font-size:.7rem;padding:.3rem .6rem;">Send</button>
                  <button class="btn" onclick="toggleMessageBox('${show.id}')" style="font-size:.7rem;padding:.3rem .6rem;border-color:var(--green-dim);color:var(--green-dim)">Cancel</button>
                </div>
                <div id="msg-flash-${show.id}" style="font-size:.7rem; margin-top:.3rem; min-height:1em;"></div>
              </div>
            </td>
          </tr>`;
      });

      html += '</tbody></table>';
      container.innerHTML = html;

    } catch (err) {
      container.innerHTML = `<div class="ln red">$ error: ${err.message}</div>`;
    }
  }

  // ── Message Guests ──────────────────────────────────────────────────────
  function toggleMessageBox(showId) {
    const box = document.getElementById(`msg-box-${showId}`);
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
  }

  async function sendMessage(showId) {
    const textarea = document.getElementById(`msg-text-${showId}`);
    const flash = document.getElementById(`msg-flash-${showId}`);
    const message = textarea.value.trim();

    if (!message) { flash.textContent = 'Message cannot be empty'; flash.style.color = 'var(--red)'; return; }
    if (!confirm('Send this message to all ticket holders?')) return;

    flash.textContent = 'Sending...';
    flash.style.color = 'var(--green-dim)';

    try {
      const res = await fetch(`${API}/message-guests`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
        body: JSON.stringify({ show_id: showId, message }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      flash.textContent = `Sent to ${data.sent} of ${data.total} guest(s)`;
      flash.style.color = 'var(--green)';
      textarea.value = '';
    } catch (err) {
      flash.textContent = err.message;
      flash.style.color = 'var(--red)';
    }
  }

  // ── Send Day-Of Message ──────────────────────────────────────────────────
  async function sendDayOf(showId, city) {
    if (!confirm(`Send day-of message to all ticket holders for ${city}?`)) return;

    try {
      const res = await fetch(`${API}/send-day-of`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
        body: JSON.stringify({ show_id: showId }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      flash('main-flash', `Day-of message sent to ${data.sent} ticket holder(s)!`, 'ok');
      loadShows();
    } catch (err) {
      flash('main-flash', err.message, 'err');
    }
  }

  // ── Announce show ──────────────────────────────────────────────────────────
  async function announceShow(showId, city) {
    if (!confirm(`Announce show in ${city}? This will SMS all subscribers in that market.`)) return;

    try {
      const res  = await fetch(`${API}/announce`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
        body:    JSON.stringify({ show_id: showId }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      flash('main-flash', `Announced! ${data.sent} of ${data.total} texts sent.`, 'ok');
      loadShows();
    } catch (err) {
      flash('main-flash', err.message, 'err');
    }
  }

  // ── Venue search & create ─────────────────────────────────────────────────
  let allVenues = [];

  async function loadVenues() {
    try {
      const res  = await fetch(`${API}/admin-venues`, { headers: { 'x-admin-key': adminKey } });
      allVenues  = await res.json();
    } catch (_) {}
  }

  function selectVenue(venue) {
    document.getElementById('s-venue-id').value   = venue.id;
    document.getElementById('venue-selected').textContent = `✓ ${venue.name} — ${venue.address}`;
    document.getElementById('venue-results').innerHTML = '';
    document.getElementById('s-venue-search').value = venue.name;
    document.getElementById('new-venue-form').style.display = 'none';
  }

  document.getElementById('venue-search-btn').addEventListener('click', () => {
    const q = document.getElementById('s-venue-search').value.trim().toLowerCase();
    const matches = allVenues.filter(v => v.name.toLowerCase().includes(q));
    const container = document.getElementById('venue-results');

    if (!matches.length) {
      container.innerHTML = `<div style="font-size:.74rem;color:var(--green-dim);margin-top:.3rem">
        $ no match — <span style="color:var(--green);cursor:pointer;text-decoration:underline" id="show-new-venue">create new venue</span>
      </div>`;
      document.getElementById('show-new-venue').addEventListener('click', () => {
        document.getElementById('new-venue-form').style.display = 'block';
        document.getElementById('v-name').value = document.getElementById('s-venue-search').value;
        container.innerHTML = '';
      });
      return;
    }

    container.innerHTML = matches.map(v =>
      `<div class="venue-option" data-id="${v.id}" style="font-size:.76rem;padding:.3rem .5rem;cursor:pointer;color:var(--green-dim);border-left:2px solid var(--green-dark);margin-top:.2rem">
        <span style="color:var(--green)">${v.name}</span> — ${v.address}, ${v.city || ''}
      </div>`
    ).join('');

    container.querySelectorAll('.venue-option').forEach(el => {
      el.addEventListener('click', () => {
        const venue = allVenues.find(v => v.id === el.dataset.id);
        if (venue) selectVenue(venue);
      });
    });
  });

  document.getElementById('create-venue-btn').addEventListener('click', async () => {
    const name    = document.getElementById('v-name').value.trim();
    const address = document.getElementById('v-address').value.trim();
    const city    = document.getElementById('v-city').value.trim();
    const zip     = document.getElementById('v-zip').value.trim();
    const state   = document.getElementById('v-state').value.trim() || 'CA';

    if (!name || !address) { flash('main-flash', 'Venue name and address required.', 'err'); return; }

    const btn = document.getElementById('create-venue-btn');
    btn.textContent = 'Saving...';
    btn.disabled = true;

    try {
      const res  = await fetch(`${API}/admin-venues`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
        body:    JSON.stringify({ name, address, city, state, zip_code: zip }),
      });
      const venue = await res.json();
      if (!res.ok) throw new Error(venue.error);
      allVenues.push(venue);
      selectVenue(venue);
      flash('main-flash', `Venue saved: ${venue.name}`, 'ok');
    } catch (err) {
      flash('main-flash', `Venue error: ${err.message}`, 'err');
    } finally {
      btn.textContent = '+ Save Venue';
      btn.disabled = false;
    }
  });

  // ── Comedian search & tag ─────────────────────────────────────────────────
  let allComedians   = [];
  let selectedComedians = []; // [{id, name}]

  async function loadComedians() {
    try {
      const res   = await fetch(`${API}/admin-comedians`, { headers: { 'x-admin-key': adminKey } });
      allComedians = await res.json();
    } catch (_) {}
  }

  function renderComedianTags() {
    const container = document.getElementById('comedian-tags');
    container.innerHTML = selectedComedians.map(c =>
      `<span style="font-size:.74rem;border:1px solid var(--green-dim);padding:.2rem .6rem;color:var(--green)">
        ${c.name} <span style="cursor:pointer;color:var(--green-dim)" data-id="${c.id}">×</span>
      </span>`
    ).join('');
    container.querySelectorAll('span[data-id]').forEach(el => {
      el.addEventListener('click', () => {
        selectedComedians = selectedComedians.filter(c => c.id !== el.dataset.id);
        document.getElementById('s-comedian-ids').value = JSON.stringify(selectedComedians.map(c => c.id));
        renderComedianTags();
      });
    });
  }

  function addComedian(comedian) {
    if (selectedComedians.find(c => c.id === comedian.id)) return;
    selectedComedians.push(comedian);
    document.getElementById('s-comedian-ids').value = JSON.stringify(selectedComedians.map(c => c.id));
    document.getElementById('comedian-results').innerHTML = '';
    document.getElementById('s-comedian-search').value = '';
    renderComedianTags();
  }

  document.getElementById('comedian-search-btn').addEventListener('click', async () => {
    const q = document.getElementById('s-comedian-search').value.trim();
    if (!q) return;

    const matches = allComedians.filter(c => c.name.toLowerCase().includes(q.toLowerCase()));
    const container = document.getElementById('comedian-results');
    container.innerHTML = '';

    if (matches.length) {
      // Show matches to pick from
      container.innerHTML = matches.map(c =>
        `<div class="comedian-option" data-id="${c.id}" style="font-size:.76rem;padding:.3rem .5rem;cursor:pointer;color:var(--green);border-left:2px solid var(--green-dark);margin-top:.2rem">${c.name}</div>`
      ).join('');
      container.querySelectorAll('.comedian-option').forEach(el => {
        el.addEventListener('click', () => {
          const c = allComedians.find(x => x.id === el.dataset.id);
          if (c) addComedian(c);
        });
      });
    } else {
      // No match — create immediately
      container.innerHTML = `<div style="font-size:.74rem;color:var(--green-dim);margin-top:.3rem">$ creating "${q}"...</div>`;
      try {
        const res = await fetch(`${API}/admin-comedians`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
          body:    JSON.stringify({ name: q }),
        });
        const comedian = await res.json();
        if (!res.ok) throw new Error(comedian.error);
        allComedians.push(comedian);
        addComedian(comedian);
        container.innerHTML = '';
      } catch (err) {
        container.innerHTML = `<div style="font-size:.74rem;color:var(--red);margin-top:.3rem">$ error: ${err.message}</div>`;
      }
    }
  });

  document.getElementById('s-comedian-search').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('comedian-search-btn').click();
  });

  // ── Edit mode ──────────────────────────────────────────────────────────────
  let editShowId = null;

  async function startEdit(id) {
    editShowId = id;

    // Fetch full show including comedians
    const res  = await fetch(`${API}/admin-shows?id=${id}`, { headers: { 'x-admin-key': adminKey } });
    const show = await res.json();

    // Open form
    document.getElementById('new-show-section').classList.add('open');
    document.getElementById('toggle-new-show').classList.add('active');
    document.getElementById('form-mode-label').textContent = `[ EDITING: ${show.city} on ${show.date} ]`;
    document.getElementById('create-show-btn').textContent = '> Update Show';
    document.getElementById('cancel-edit-btn').style.display = 'block';

    // Populate fields
    document.getElementById('s-date').value     = show.date     || '';
    document.getElementById('s-time').value     = show.show_time || '';
    document.getElementById('s-city').value     = show.city     || '';
    document.getElementById('s-capacity').value = show.capacity || '';
    document.getElementById('s-loc-zip').value  = show.location_zip || '';
    document.getElementById('s-zips').value     = (show.zip_codes || []).join(', ');
    document.getElementById('s-price').value    = show.ticket_price_cents ? show.ticket_price_cents / 100 : '';
    document.getElementById('s-venue-type').value = show.venue_type     || '';
    document.getElementById('s-age').value        = show.age_requirement || '';
    document.getElementById('s-drinks').value     = show.drinks         || '';
    document.getElementById('s-status').value     = show.status         || 'draft';
    document.getElementById('s-day-msg').value    = show.day_of_message || '';

    // Venue
    if (show.venue_id) {
      const venue = allVenues.find(v => v.id === show.venue_id);
      if (venue) selectVenue(venue);
    }

    // Comedians
    selectedComedians = [];
    const comedianLinks = show.show_comedians || [];
    comedianLinks.forEach(link => {
      if (link.comedians) selectedComedians.push({ id: link.comedians.id, name: link.comedians.name });
    });
    document.getElementById('s-comedian-ids').value = JSON.stringify(selectedComedians.map(c => c.id));
    renderComedianTags();

    // Scroll to form
    document.getElementById('new-show-section').scrollIntoView({ behavior: 'smooth' });
  }

  function exitEdit() {
    editShowId = null;
    document.getElementById('form-mode-label').textContent = '[ CREATE SHOW ]';
    document.getElementById('create-show-btn').textContent = '> Create Show';
    document.getElementById('cancel-edit-btn').style.display = 'none';
  }

  document.getElementById('cancel-edit-btn').addEventListener('click', () => {
    exitEdit();
    document.getElementById('new-show-section').classList.remove('open');
    document.getElementById('toggle-new-show').classList.remove('active');
  });

  // ── Create / Update show ───────────────────────────────────────────────────
  document.getElementById('create-show-btn').addEventListener('click', async () => {
    const date       = document.getElementById('s-date').value.trim();
    const city       = document.getElementById('s-city').value.trim();
    const locZip     = document.getElementById('s-loc-zip').value.trim();
    const price      = parseFloat(document.getElementById('s-price').value) || 20;
    const zipsRaw    = document.getElementById('s-zips').value;
    const status     = document.getElementById('s-status').value;
    const zipCodes   = zipsRaw.split(',').map(z => z.trim()).filter(Boolean);
    const showTime   = document.getElementById('s-time').value.trim();
    const venueType  = document.getElementById('s-venue-type').value;
    const age        = document.getElementById('s-age').value;
    const drinks     = document.getElementById('s-drinks').value;
    const capacity   = parseInt(document.getElementById('s-capacity').value) || null;
    const venueId    = document.getElementById('s-venue-id').value || null;
    const comedianIds = JSON.parse(document.getElementById('s-comedian-ids').value || '[]');
    const dayOfMessage = document.getElementById('s-day-msg').value.trim();

    if (!date || !city || !locZip || !zipCodes.length) {
      flash('main-flash', 'Date, city, location zip, and notify zips are required.', 'err');
      return;
    }

    const btn = document.getElementById('create-show-btn');
    btn.textContent = editShowId ? 'Updating...' : 'Creating...';
    btn.disabled = true;

    try {
      const payload = {
        date, city,
        location_zip:       locZip,
        zip_codes:          zipCodes,
        ticket_price_cents: Math.round(price * 100),
        status,
        show_time:          showTime  || null,
        venue_type:         venueType || null,
        age_requirement:    age       || null,
        drinks:             drinks    || null,
        capacity,
        venue_id:           venueId,
        comedian_ids:       comedianIds,
        day_of_message:     dayOfMessage || null,
      };
      if (editShowId) payload.id = editShowId;

      const res  = await fetch(`${API}/admin-shows`, {
        method:  editShowId ? 'PATCH' : 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
        body:    JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      flash('main-flash', editShowId ? `Show updated: ${city} on ${date}` : `Show created: ${city} on ${date}`, 'ok');
      exitEdit();
      // Reset form
      ['s-date','s-city','s-loc-zip','s-zips','s-price','s-time','s-capacity','s-day-msg',
       's-venue-search','s-venue-id','v-name','v-address','v-city','v-zip'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      document.getElementById('venue-selected').textContent  = '';
      document.getElementById('comedian-tags').innerHTML     = '';
      document.getElementById('s-comedian-ids').value        = '[]';
      document.getElementById('zip-radius-status').textContent = '';
      document.getElementById('new-venue-form').style.display = 'none';
      selectedComedians = [];
      document.getElementById('new-show-section').classList.remove('open');
      document.getElementById('toggle-new-show').classList.remove('active');
      loadShows();
    } catch (err) {
      flash('main-flash', err.message, 'err');
    } finally {
      btn.textContent = editShowId ? '> Update Show' : '> Create Show';
      btn.disabled = false;
    }
  });

  // ── Auto-fill notify zips from location zip ────────────────────────────────
  let zipDebounce;
  document.getElementById('s-loc-zip').addEventListener('input', function () {
    const zip = this.value.trim();
    const statusEl = document.getElementById('zip-radius-status');
    clearTimeout(zipDebounce);

    if (zip.length < 5) {
      statusEl.textContent = '';
      return;
    }

    statusEl.textContent = '$ scanning radius...';
    zipDebounce = setTimeout(async () => {
      try {
        const res  = await fetch(`${API}/zip-radius?zip=${encodeURIComponent(zip)}&miles=25`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        document.getElementById('s-zips').value = data.join(', ');
        statusEl.textContent = `$ ${data.length} zip codes within 25 miles`;
        statusEl.style.color = 'var(--green)';
      } catch (err) {
        statusEl.textContent = `$ error: ${err.message}`;
        statusEl.style.color = 'var(--red)';
      }
    }, 600);
  });

  // ── Toggle new show form ───────────────────────────────────────────────────
  document.getElementById('toggle-new-show').addEventListener('click', function () {
    this.classList.toggle('active');
    document.getElementById('new-show-section').classList.toggle('open');
  });

  // ── Auth ───────────────────────────────────────────────────────────────────
  function showMain() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    loadShows();
    loadVenues();
    loadComedians();
  }

  async function authenticate() {
    const key = document.getElementById('admin-key-input').value.trim();
    if (!key) { flash('auth-flash', 'Enter your admin key.', 'err'); return; }

    const btn = document.getElementById('auth-btn');
    btn.textContent = '> Authenticating...';
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/admin-shows`, {
        headers: { 'x-admin-key': key },
      });

      if (res.ok) {
        adminKey = key;
        sessionStorage.setItem(KEY_STORE, key);
        showMain();
      } else if (res.status === 401) {
        flash('auth-flash', 'Invalid admin key.', 'err');
      } else {
        flash('auth-flash', `Unexpected error (${res.status}). Try again.`, 'err');
      }
    } catch (err) {
      flash('auth-flash', `Connection error: ${err.message}`, 'err');
    } finally {
      btn.textContent = '> Authenticate';
      btn.disabled = false;
    }
  }

  document.getElementById('auth-btn').addEventListener('click', authenticate);
  document.getElementById('admin-key-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') authenticate();
  });

  document.getElementById('logout-btn').addEventListener('click', () => {
    sessionStorage.removeItem(KEY_STORE);
    adminKey = '';
    document.getElementById('main-screen').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'block';
    document.getElementById('admin-key-input').value = '';
  });

  // Auto-login if key is in session
  if (adminKey) showMain();
</script>
</body>
</html>
