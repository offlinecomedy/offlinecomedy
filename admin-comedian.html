<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OFFLINE COMEDY — COMEDIAN</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --green:#00ff41; --green-dim:#00b32c; --green-dark:#003b0f; --yellow:#ffd700; --red:#ff4444; --bg:#050505; }
    body { background:var(--bg); color:var(--green); font-family:'Share Tech Mono','Courier New',monospace; min-height:100vh; display:flex; align-items:flex-start; justify-content:center; padding:2rem 1rem; }
    body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,rgba(0,255,65,.025) 0px,rgba(0,255,65,.025) 1px,transparent 1px,transparent 2px); pointer-events:none; z-index:999; }
    .terminal { width:100%; max-width:740px; border:1px solid var(--green-dim); border-radius:4px; box-shadow:0 0 24px rgba(0,255,65,.18); overflow:hidden; }
    .terminal-bar { background:var(--green-dark); border-bottom:1px solid var(--green-dim); padding:8px 14px; display:flex; align-items:center; gap:10px; }
    .dots { display:flex; gap:6px; }
    .dot { width:11px; height:11px; border-radius:50%; background:var(--green-dim); opacity:.45; }
    .terminal-title { flex:1; text-align:center; font-size:.68rem; color:var(--green-dim); letter-spacing:.18em; }
    .terminal-body { padding:1.4rem 1.6rem 2rem; background:var(--bg); }
    .ln { font-size:.82rem; line-height:1.65; }
    .dim { color:var(--green-dim); }
    .bright { color:var(--green); text-shadow:0 0 8px rgba(0,255,65,.55); }
    .yellow { color:var(--yellow); }
    .sep { border:none; border-top:1px solid var(--green-dark); margin:1rem 0; }
    .row { font-size:.78rem; line-height:1.9; color:var(--green-dim); }
    .row em { color:var(--green); font-style:normal; }
    .section-label { font-size:.72rem; color:var(--green-dim); letter-spacing:.15em; margin:1rem 0 .4rem; text-transform:uppercase; }
    .stat-row { display:flex; gap:1.5rem; flex-wrap:wrap; margin:.6rem 0; }
    .stat { font-size:.74rem; color:var(--green-dim); }
    .stat em { color:var(--green); font-style:normal; font-size:.88rem; }
    .back-link { display:inline-block; margin-top:1.2rem; font-size:.75rem; color:var(--green-dim); text-decoration:none; letter-spacing:.1em; }
    .back-link:hover { color:var(--green); }
    .booking-card {
      border:1px solid var(--green-dark); padding:.5rem .7rem; margin-bottom:.4rem;
      background:rgba(0,255,65,.02); cursor:pointer; transition:border-color .15s;
    }
    .booking-card:hover { border-color:var(--green-dim); }
    .booking-card.cancelled { opacity:.5; }
    .booking-top { display:flex; align-items:center; gap:.6rem; flex-wrap:wrap; }
    .booking-date { font-size:.78rem; color:var(--yellow); }
    .booking-city { font-size:.78rem; color:var(--green); }
    .booking-title { font-size:.68rem; color:var(--green-dim); margin-left:auto; }
    .booking-details { display:flex; gap:1rem; flex-wrap:wrap; font-size:.7rem; color:var(--green-dim); margin-top:.25rem; }
    .booking-details em { color:var(--green); font-style:normal; }
    .booking-notes { font-size:.68rem; color:var(--green-dim); margin-top:.3rem; font-style:italic; }
    .ig-link { color:var(--green-dim); text-decoration:none; font-size:.76rem; }
    .ig-link:hover { color:var(--green); }
    .cur { display:inline-block; width:8px; height:.9em; background:var(--green); vertical-align:text-bottom; animation:blink 1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>
<div class="terminal">
  <div class="terminal-bar">
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="terminal-title">offlinecomedy.com — comedian_profile.enc</div>
  </div>
  <div class="terminal-body">
    <div id="loading"><div class="ln dim">$ loading comedian<span class="cur"></span></div></div>
    <div id="content" style="display:none"></div>
    <a href="javascript:history.back()" class="back-link">&lt; back</a>
    <div style="margin-top:1rem"><span class="ln dim">&gt; </span><span class="cur"></span></div>
  </div>
</div>

<script>
  const API = 'https://offlinecomedy-backend.vercel.app/api';
  const params = new URLSearchParams(window.location.search);
  const comedianId = params.get('id');
  const adminKey = sessionStorage.getItem('oc_admin_key');

  if (!adminKey) window.location.href = 'admin.html';

  async function load() {
    if (!comedianId) {
      document.getElementById('loading').innerHTML = '<div class="ln yellow">$ no comedian specified</div>';
      return;
    }

    try {
      const res = await fetch(`${API}/admin-comedian?id=${comedianId}`, {
        headers: { 'x-admin-key': adminKey },
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      render(data);
    } catch (err) {
      document.getElementById('loading').innerHTML = `<div class="ln yellow">$ ${err.message}</div>`;
    }
  }

  function render(c) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('content');
    el.style.display = 'block';

    const ratingColors = { 5:'var(--green)', 4:'var(--green)', 3:'var(--green-dim)', 2:'var(--yellow)', 1:'var(--red)' };

    // Sort bookings by show date descending
    const bookings = (c.bookings || []).sort((a, b) => {
      const aDate = a.shows ? a.shows.date : '';
      const bDate = b.shows ? b.shows.date : '';
      return bDate.localeCompare(aDate);
    });

    const igHandle = c.instagram ? c.instagram.replace(/@/g, '') : null;

    el.innerHTML = `
      <div class="ln bright" style="margin-bottom:.3rem; font-size:1rem;">[ ${c.name.toUpperCase()} ]</div>

      ${igHandle ? `<a class="ig-link" href="https://instagram.com/${igHandle}" target="_blank">@${igHandle}</a>` : ''}
      <span style="font-size:.72rem; color:var(--green-dim); margin-left:.6rem;">
        <input type="number" id="follower-input" value="${c.followers || ''}" placeholder="0" style="background:transparent; border:1px solid var(--green-dark); color:var(--green); font-family:inherit; font-size:.72rem; width:70px; padding:.15rem .3rem; outline:none; text-align:right;" />
        followers
        <span id="save-followers" style="cursor:pointer; text-decoration:underline; margin-left:.4rem; color:var(--green-dim); font-size:.68rem;">update</span>
        <span id="follower-flash" style="font-size:.66rem; margin-left:.3rem;"></span>
      </span>

      <hr class="sep" />

      <!-- Contact -->
      <div class="row">${c.email ? `EMAIL ............ <em>${c.email}</em>` : 'EMAIL ............ <em style="color:var(--green-dim)">—</em>'}</div>
      <div class="row">${c.phone ? `PHONE ............ <em>${c.phone}</em>` : 'PHONE ............ <em style="color:var(--green-dim)">—</em>'}</div>
      <div class="row">${c.venmo ? `VENMO ............ <em>${c.venmo}</em>` : 'VENMO ............ <em style="color:var(--green-dim)">—</em>'}</div>
      ${c.notes ? `<div class="row" style="margin-top:.3rem; font-style:italic;">NOTES: ${c.notes}</div>` : ''}

      <hr class="sep" />

      <!-- Stats -->
      <div class="stat-row">
        <div class="stat">SHOWS<br><em>${c.stats.shows_performed}</em></div>
        <div class="stat">AVG RATING<br><em>${c.stats.avg_rating || '—'}</em><span style="font-size:.68rem">/5</span></div>
        <div class="stat">TOTAL PAID<br><em>$${(c.stats.total_paid_cents / 100).toLocaleString()}</em></div>
        ${c.stats.cancellations > 0 ? `<div class="stat">CANCELLED<br><em style="color:var(--red)">${c.stats.cancellations}</em></div>` : ''}
      </div>

      <hr class="sep" />

      <!-- Booking History -->
      <div class="section-label">booking history</div>
      ${bookings.length === 0 ? '<div class="ln dim">$ no bookings found</div>' : ''}
      <div id="bookings-list"></div>
    `;

    const listEl = document.getElementById('bookings-list');
    bookings.forEach(b => {
      const show = b.shows;
      const card = document.createElement('div');
      card.className = 'booking-card' + (b.status === 'cancelled' ? ' cancelled' : '');

      const rate = b.rate_cents ? '$' + (b.rate_cents / 100).toFixed(0) : '';
      const rColor = ratingColors[b.rating] || 'var(--green-dim)';
      const statusTag = b.status === 'cancelled'
        ? '<span style="color:var(--red);font-size:.66rem;"> CANCELLED</span>'
        : b.status === 'booked'
        ? '<span style="color:var(--yellow);font-size:.66rem;"> BOOKED</span>'
        : '';

      card.innerHTML = `
        <div class="booking-top">
          <span class="booking-date">${show ? show.date : '—'}</span>
          <span class="booking-city">${show ? show.city : '—'}</span>
          ${statusTag}
          <span class="booking-title">${b.title || ''}</span>
        </div>
        <div class="booking-details">
          ${rate ? `<span>RATE: <em>${rate}</em></span>` : ''}
          ${b.rating ? `<span>RATING: <em style="color:${rColor}">${b.rating}/5 ${b.rating_label || ''}</em></span>` : ''}
          ${b.set_minutes ? `<span>SET: <em>${b.set_minutes}min</em></span>` : ''}
        </div>
        ${b.notes ? `<div class="booking-notes">${b.notes}</div>` : ''}
      `;

      // Click to navigate to show
      if (show && show.id) {
        card.addEventListener('click', () => {
          window.location.href = `admin-show.html?id=${show.id}`;
        });
      }

      listEl.appendChild(card);
    });

    // Wire up follower update
    document.getElementById('save-followers').addEventListener('click', async () => {
      const val = parseInt(document.getElementById('follower-input').value) || 0;
      const flashEl = document.getElementById('follower-flash');
      try {
        const res = await fetch(`${API}/admin-comedian`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
          body: JSON.stringify({ id: comedianId, followers: val }),
        });
        if (!res.ok) { const d = await res.json(); throw new Error(d.error); }
        flashEl.textContent = 'saved';
        flashEl.style.color = 'var(--green)';
        setTimeout(() => { flashEl.textContent = ''; }, 2000);
      } catch (err) {
        flashEl.textContent = err.message;
        flashEl.style.color = 'var(--red)';
      }
    });
  }

  load();
</script>
</body>
</html>
